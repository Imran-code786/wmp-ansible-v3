- name: Set ownership
  ansible.builtin.file:
    path: /app
    owner: appuser
    group: appuser
    recurse: yes
    mode: 'o-rwx'

- name: Copy service file
  ansible.builtin.copy:
    src: analytics-service.service
    dest: /etc/systemd/system/analytics-service.service

- name: Start analytics-service
  ansible.builtin.systemd_service:
    name: analytics-service
    daemon_reload: yes
    enabled: yes
    state: restarted