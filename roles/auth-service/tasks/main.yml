
- name: Install Golang
  ansible.builtin.dnf:
    name: golang
    state: present

- name: Copy service file
  ansible.builtin.copy:
    src: auth-service.service
    dest: /etc/systemd/system/auth-service.service



- name: Build application
  ansible.builtin.shell: CGO_ENABLED=0 go build -o auth-service ./cmd/server
  args:
    chdir: /app

- name: Include systemd
  ansible.builtin.include_role:
    name: common
    tasks_from: systemd